name: Build WatermarkApp

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1

    - name: Restore NuGet packages
      run: nuget restore WatermarkApp.csproj

    - name: Build Release
      run: msbuild WatermarkApp.csproj /p:Configuration=Release /p:Platform=AnyCPU

    - name: Prepare installer staging
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force output | Out-Null
        Copy-Item bin\Release\WatermarkApp.exe output\
        Copy-Item config.ini output\
        Write-Host "Staging files:"
        Get-ChildItem output\

    - name: Install Inno Setup
      run: choco install innosetup -y --no-progress

    - name: Build Installer
      shell: pwsh
      run: |
        $iss = Get-Content setup.iss -Raw
        $iss = $iss -replace 'Source: "bin\\\\Release\\\\', 'Source: "output\\'
        $iss = $iss -replace 'Source: "config\\.ini"', 'Source: "output\\config.ini"'
        $iss | Set-Content setup_ci.iss

        Write-Host "=== Modified setup.iss ==="
        Get-Content setup_ci.iss | Select-String "Source:"

        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup_ci.iss

    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: WatermarkApp-Setup
        path: Output\WatermarkApp_Setup.exe
        if-no-files-found: error

    - name: Upload Portable Build
      uses: actions/upload-artifact@v4
      with:
        name: WatermarkApp-Portable
        path: |
          bin\Release\WatermarkApp.exe
          config.ini
